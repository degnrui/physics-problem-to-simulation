services:
  backend:
    build:
      context: ./backend
    container_name: physics-problem-to-simulation-backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: physics-problem-to-simulation-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
